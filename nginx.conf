server {
    listen 80;
    listen [::]:80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|gif|ico|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    location = /health {
        access_log off;
        return 200 "OK";
    }
}
