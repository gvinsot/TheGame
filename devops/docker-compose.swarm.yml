services:
  thegame:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ${REGISTRY_URL:-ghcr.io/gvinsot}/${REPO_NAME:-thegame}:${VERSION:-1.0}
    networks:
      - proxy
    environment:
      - APP_NAME=thegame
      - DOMAIN=thegame.vinsot.fr
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.thegame.loadbalancer.server.port=80"
        # Router HTTPS
        - "traefik.http.routers.thegame.rule=Host(`thegame.vinsot.fr`)"
        - "traefik.http.routers.thegame.entrypoints=websecure"
        - "traefik.http.routers.thegame.tls.certresolver=letsencrypt"
        - "traefik.http.routers.thegame.middlewares=global@file"
        # Router HTTP (redirect to HTTPS)
        - "traefik.http.routers.thegame-http.rule=Host(`thegame.vinsot.fr`)"
        - "traefik.http.routers.thegame-http.entrypoints=web"
        - "traefik.http.routers.thegame-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.thegame-http.service=noop@internal"

networks:
  proxy:
    external: true