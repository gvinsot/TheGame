services:
  thegame:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ${REGISTRY_URL:-ghcr.io/gvinsot}/${REPO_NAME:-thegame}:${VERSION:-1.0}
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
    ports:
      - "80:80"
    environment:
      - APP_NAME=thegame
      - DOMAIN=thegame.vinsot.fr
    networks:
      - thegame-network

networks:
  thegame-network:
    driver: overlay